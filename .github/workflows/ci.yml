name: Nexus CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  dotnet-build:
    name: .NET build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore
